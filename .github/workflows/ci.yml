name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  backend-tests:
    name: Backend tests (Django)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker compose build api

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: >-
          docker compose exec -T postgres sh -c
          'for i in $(seq 1 60); do
             if pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; then exit 0; fi;
             sleep 1;
           done;
           echo "Postgres did not become ready in time" >&2;
           exit 1'

      - name: Run Django tests
        run: >-
          docker compose run --rm api sh -c
          "python manage.py migrate && python manage.py seed_lookups && python manage.py test content --verbosity=0"

      - name: Tear down services
        if: always()
        run: docker compose down -v

  admin-ui:
    name: Admin UI build + tests (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/ui/package-lock.json

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        env:
          CI: "true"
          CHROME_BIN: google-chrome
        run: npm test -- --watch=false --browsers=ChromeHeadless

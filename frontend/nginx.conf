server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are content-addressed — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The SPA entry point must never be cached, otherwise a browser keeps
    # loading a stale index.html that points at a bundle hash removed by the
    # last rebuild (blank page / "offers and filters disappeared").
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

@if (auth.loggedIn) {
  <div class="app-shell">
    <aside>
      <p class="brand">{{ title }}</p>
      <nav>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/offers" routerLinkActive="active">Offers</a>
        @if (auth.isAdmin) {
          <a routerLink="/admin/users" routerLinkActive="active">
            User Management
            @if (pendingCount > 0) {
              <span class="badge">{{ pendingCount }}</span>
            }
          </a>
          <a routerLink="/admin/domains" routerLinkActive="active">Allowed Domains</a>
          <a routerLink="/admin/scrapper" routerLinkActive="active">Scrapper Tracking</a>
          <a routerLink="/admin/import" routerLinkActive="active">Bulk Import</a>
        }
      </nav>
      <div class="user-section">
        <a [href]="publicSiteUrl" target="_blank" class="cross-portal-link" rel="noopener">← Public Site</a>
        <span class="username">{{ auth.currentUser?.username }}</span>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    </aside>
    <main>
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}

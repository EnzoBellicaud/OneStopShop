@if (auth.isLoggedIn()) {
  <div class="app-shell">
    <aside>
      <p class="brand">{{ title }}</p>
      <nav>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/offers" routerLinkActive="active">Offers</a>
        <a routerLink="/admin/scrapper" routerLinkActive="active">Scrapper Tracking</a>
        <a routerLink="/admin/import" routerLinkActive="active">Bulk Import</a>
      </nav>
      <div class="user-section">
        <span class="username">{{ auth.currentUser?.username }}</span>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    </aside>
    <main>
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}

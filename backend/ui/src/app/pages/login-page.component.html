<div class="login-shell">
  <!-- Left branding panel -->
  <div class="login-brand-panel">
    <div class="login-brand-rule"></div>
    <p class="login-brand-eyebrow">SUNRISE One Stop Shop</p>
    <h2 class="login-brand-title">Admin<br><em>Management</em><br>Portal</h2>
    <p class="login-brand-desc">Manage users, offers, organizations, and scraper activity across the platform.</p>
  </div>

  <!-- Right form panel -->
  <div class="login-card">
    <p class="brand">SUNRISE OSS</p>
    <h1>Sign in</h1>
    <p class="subtitle">Administration access only</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          required
          autocomplete="username"
          placeholder="admin"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button type="submit" [disabled]="loading || !loginForm.valid">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>

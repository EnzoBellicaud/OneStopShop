<div class="login-shell">
  <!-- Left branding panel -->
  <div class="login-brand-panel">
    <div class="login-brand-rule"></div>
    <p class="login-brand-eyebrow">{{ 'login.eyebrow' | translate }}</p>
    <h2 class="login-brand-title">{{ 'login.brandTitle1' | translate }}<br><em>{{ 'login.brandTitle2' | translate }}</em><br>{{ 'login.brandTitle3' | translate }}</h2>
    <p class="login-brand-desc">{{ 'login.brandDesc' | translate }}</p>
  </div>

  <!-- Right form panel -->
  <div class="login-card">
    <div class="login-lang" style="position:absolute;top:1.25rem;right:1.5rem;color:#111110;"><app-language-switcher></app-language-switcher></div>
    <p class="brand">SUNRISE OSS</p>
    <h1>{{ 'login.signIn' | translate }}</h1>
    <p class="subtitle">{{ 'login.subtitle' | translate }}</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label for="username">{{ 'login.username' | translate }}</label>
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          required
          autocomplete="username"
          placeholder="admin"
        />
      </div>

      <div class="field">
        <label for="password">{{ 'login.password' | translate }}</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button type="submit" [disabled]="loading || !loginForm.valid">
        {{ loading ? ('login.signingIn' | translate) : ('login.signIn' | translate) }}
      </button>
    </form>
  </div>
</div>
